version: '3.8'

services:
  app:
    build: .
    container_name: status-tracker-app
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - HOST_NAME=${HOST_NAME}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    networks:
      - traefik

  redis:
    image: redis:alpine
    container_name: status-tracker-redis
    restart: unless-stopped
    networks:
      - traefik

  worker:
    build: .
    container_name: status-tracker-worker
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - API_AUTH_TOKEN=${API_AUTH_TOKEN}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    networks:
      - traefik
    command: ["python", "worker.py"]

networks:
  traefik:
    external: true
